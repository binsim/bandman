name: Continuous Integration

# This action works with pull requests and pushes on the main branch
on:
    pull_request:
    push:
        branches: [main]

jobs:
    prettier:
        name: Prettier Check
        runs-on: ubuntu-lates
        # Run this job if the event is not a pull request OR the pull request is not a draft.
        # This prevents the job from running for draft PRs.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft != true }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v2

            - name: Run Prettier
              id: prettier-run
              uses: rutajdash/prettier-cli-action@v1.0.0
              with:
                  config_path: ./.prettierrc.yml

            # This step only runs if prettier finds errors causing the previous step to fail
            # This steps lists the files where errors were found
            - name: Prettier Output
              if: ${{ failure() }}
              shell: bash
              run: |
                  echo "The following files are not formatted:"
                  echo "${{steps.prettier-run.outputs.prettier_output}}"

name: Prettier — Continuous Integration

# Run on pushes to main and on PR events including when a draft PR is
# marked "ready for review" so the workflow will start automatically then.
on:
    push:
        branches: [main]
    pull_request:
        # include the ready_for_review type so workflows start when a draft is
        # converted to a regular PR
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    prettier:
        name: Prettier Check
        runs-on: ubuntu-latest
        # Only run for non-draft pull requests (or non-PR events like push).
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft != true }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  # Use Node 25.x for Prettier checks to match your local environment (v25.2.1).
                  # We avoid running npm install here to prevent Prisma/node-version conflicts.
                  node-version: '25.x'
                  cache: 'npm'

            - name: Run Prettier (check)
              id: prettier-run
              run: npx prettier --check .

            - name: Show Prettier output when there are formatting errors
              if: ${{ failure() }}
              run: |
                  echo "Prettier found formatting issues. Run 'npx prettier --write .' locally to fix them."
                  # Show which files differ (prettier --check prints this to stdout/stderr).
                  npx prettier --check . || true

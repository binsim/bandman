# Dependabot configuration - combine all npm updates into a single PR per run
version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
      # Maximum number of open Dependabot PRs for this ecosystem
      open-pull-requests-limit: 10
      # Consistent commit message / PR title prefix
      commit-message:
          prefix: 'chore(deps)'
      # Group rules: match all dependencies so Dependabot combines them into one PR
      groups:
          combined-dependencies:
              patterns:
                  - '*'
